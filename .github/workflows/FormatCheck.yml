name: Format suggestions
on:
  push:            # Runs on all pushes to any branch
  pull_request:    # Runs on all PR events (open, sync, reopen)
jobs:
  code-style:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      checks: write
      issues: write
      pull-requests: write
    steps:
      - uses: julia-actions/julia-format@v4
        with:
          version: '2'

